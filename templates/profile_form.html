{% extends "base.html" %}
{% block title %}Your profile — RentMate{% endblock %}
{% block content %}
<div style="max-width:520px;margin:0 auto;">
  <div class="eyebrow">Tenant profile</div>
  <h2>What are you looking for?</h2>
  <form method="POST" class="card">
    <div class="field">
      <label for="preferred_location">Preferred location</label>
      <input type="text" id="preferred_location" name="preferred_location"
             value="{{ profile.preferred_location if profile else '' }}" required>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="budget_min">Budget min (₹)</label>
        <input type="number" id="budget_min" name="budget_min" min="0"
               value="{{ profile.budget_min if profile else '' }}" required>
      </div>
      <div class="field">
        <label for="budget_max">Budget max (₹)</label>
        <input type="number" id="budget_max" name="budget_max" min="0"
               value="{{ profile.budget_max if profile else '' }}" required>
      </div>
    </div>
    <div class="field">
      <label for="move_in_date">Move-in date</label>
      <input type="date" id="move_in_date" name="move_in_date"
             value="{{ profile.move_in_date if profile else '' }}" required>
    </div>
    <div class="field">
      <label for="bio">About you (optional)</label>
      <textarea id="bio" name="bio">{{ profile.bio if profile else '' }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Save profile</button>
  </form>
</div>
{% endblock %}
