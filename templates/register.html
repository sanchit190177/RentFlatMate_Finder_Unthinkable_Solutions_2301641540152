{% extends "base.html" %}
{% block title %}Create account — RentMate{% endblock %}
{% block content %}
<div style="max-width:420px;margin:0 auto;">
  <div class="eyebrow">Join RentMate</div>
  <h2>Create your account</h2>
  <form method="POST" class="card">
    <div class="field">
      <label for="name">Full name</label>
      <input type="text" id="name" name="name" required>
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
    </div>
    <div class="field">
      <label for="role">I am a</label>
      <select id="role" name="role" required>
        <option value="">Select one</option>
        <option value="tenant">Tenant — looking for a room</option>
        <option value="owner">Owner — listing a room</option>
      </select>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Create account</button>
  </form>
  <p class="muted" style="margin-top:16px;text-align:center;">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
</div>
{% endblock %}
