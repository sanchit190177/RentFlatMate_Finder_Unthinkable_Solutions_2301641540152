{% extends "base.html" %}
{% block title %}Chat — RentMate{% endblock %}
{% block content %}
<div style="max-width:640px;margin:0 auto;">
  <div class="eyebrow">Conversation</div>
  <h2>{{ interest.listing.location }}</h2>

  <div class="chat-window" id="chat-window">
    {% for m in history %}
    <div class="bubble {{ 'bubble-mine' if m.sender_id == current_user.id else 'bubble-theirs' }}">
      {{ m.content }}
      <div class="bubble-meta">{{ m.sender.name }} · {{ m.sent_at.strftime('%H:%M') }}</div>
    </div>
    {% endfor %}
  </div>

  <form id="chat-form" class="chat-input-row">
    <input type="text" id="chat-input" placeholder="Type a message…" autocomplete="off">
    <button type="submit" class="btn btn-primary">Send</button>
  </form>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<script>
  const interestId = {{ interest.id }};
  const currentUserId = {{ current_user.id }};
  const socket = io();
  const chatWindow = document.getElementById('chat-window');

  socket.on('connect', () => {
    socket.emit('join', { interest_id: interestId });
  });

  socket.on('new_message', (msg) => {
    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + (msg.sender_id === currentUserId ? 'bubble-mine' : 'bubble-theirs');
    bubble.innerHTML = `${escapeHtml(msg.content)}<div class="bubble-meta">${escapeHtml(msg.sender_name)} · ${msg.sent_at}</div>`;
    chatWindow.appendChild(bubble);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  });

  document.getElementById('chat-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const input = document.getElementById('chat-input');
    const content = input.value.trim();
    if (!content) return;
    socket.emit('send_message', { interest_id: interestId, content });
    input.value = '';
  });

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  chatWindow.scrollTop = chatWindow.scrollHeight;
</script>
{% endblock %}
